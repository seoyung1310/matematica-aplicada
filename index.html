<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meus Objetivos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Meus objetivos do ano</h2>

    <div class="tabs">
      <button class="tab active" data-target="obj1">Estudar cursos na Alura</button>
      <button class="tab" data-target="obj2">Criar projetos em JavaScript</button>
      <button class="tab" data-target="obj3">Criar um portfólio</button>
      <button class="tab" data-target="obj4">Atualizar meu currículo</button>
    </div>

    <div class="content active" id="obj1">
      <h3>Estudar 4 cursos na Alura</h3>
      <div class="timer" data-date="2026-05-10"></div>
    </div>

    <div class="content" id="obj2">
      <h3>Criar 3 projetos em JavaScript</h3>
      <div class="timer" data-date="2026-06-01"></div>
    </div>

    <div class="content" id="obj3">
      <h3>Montar portfólio online</h3>
      <div class="timer" data-date="2026-07-01"></div>
    </div>

    <div class="content" id="obj4">
      <h3>Atualizar currículo</h3>
      <div class="timer" data-date="2026-05-20"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
